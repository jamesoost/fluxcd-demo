name: GitOps PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.2/kustomize_v5.4.2_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo install -m 755 kustomize /usr/local/bin/kustomize

      - name: Validate kustomize build
        run: |
          kustomize build . > /tmp/rendered.yaml
          echo "Rendered manifests to /tmp/rendered.yaml"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz -C /tmp
          sudo install -m 755 /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate YAML schemas (Including Flux CRDs)
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -skip SealedSecret \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml

      - name: Install kube-linter
        run: |
          curl -sSLo /tmp/kube-linter.tar.gz https://github.com/stackrox/kube-linter/releases/download/v0.7.0/kube-linter-linux.tar.gz
          tar -xzf /tmp/kube-linter.tar.gz -C /tmp
          sudo install -m 755 /tmp/kube-linter /usr/local/bin/kube-linter

      - name: Run kube-linter
        id: lint-app
        continue-on-error: true
        run: |
          kube-linter lint /tmp/rendered.yaml

      - name: Install yq
        run: |
          sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Monitoring Stack
        run: |
          REPOS_FILE="fluxcd-demo/monitoring/repositories.yaml"
          RELEASES_FILE="fluxcd-demo/monitoring/releases.yaml"

          REPO_NAMES=$(yq eval 'select(.kind == "HelmRepository") | .metadata.name' "$REPOS_FILE")
          for REPO in $REPO_NAMES; do
            URL=$(yq eval "select(.metadata.name == \"$REPO\") | .spec.url" "$REPOS_FILE")
            helm repo add "$REPO" "$URL"
          done
          helm repo update

          rm -f /tmp/helm-rendered.yaml
          touch /tmp/helm-rendered.yaml

          NAMES=$(yq eval 'select(.kind == "HelmRelease") | .metadata.name' "$RELEASES_FILE")
          for NAME in $NAMES; do
            CHART=$(yq eval "select(.metadata.name == \"$NAME\") | .spec.chart.spec.chart" "$RELEASES_FILE")
            VERSION=$(yq eval "select(.metadata.name == \"$NAME\") | .spec.chart.spec.version" "$RELEASES_FILE")
            SOURCE=$(yq eval "select(.metadata.name == \"$NAME\") | .spec.chart.spec.sourceRef.name" "$RELEASES_FILE")

            yq eval "select(.metadata.name == \"$NAME\") | .spec.values" "$RELEASES_FILE" > /tmp/values-$NAME.yaml

            echo "Rendering $NAME ($SOURCE/$CHART @ $VERSION)"
            helm template "$NAME" "$SOURCE/$CHART" \
              --version "$VERSION" \
              -f /tmp/values-$NAME.yaml \
              --namespace monitoring >> /tmp/helm-rendered.yaml
          done

      - name: Lint monitoring stack
        id: lint-monitoring
        continue-on-error: true
        run: |
          kube-linter lint --config .kube-linter-monitoring.yaml /tmp/helm-rendered.yaml

      - name: Fail if any lint step failed
        if: steps.lint-app.outcome == 'failure' || steps.lint-monitoring.outcome == 'failure'
        run: |
          echo "One or more kube-linter checks failed — see logs above."
          exit 1