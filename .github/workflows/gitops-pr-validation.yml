name: GitOps PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: gitops-pr-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.2/kustomize_v5.4.2_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo install -m 755 kustomize /usr/local/bin/kustomize

      - name: Validate kustomize build
        run: |
          kustomize build clusters/dev > /tmp/rendered-dev.yaml
          kustomize build clusters/prod > /tmp/rendered-prod.yaml
          cat /tmp/rendered-dev.yaml /tmp/rendered-prod.yaml > /tmp/rendered.yaml
          echo "Rendered manifests for dev and prod to /tmp/rendered.yaml"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz -C /tmp
          sudo install -m 755 /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate YAML schemas (Including Flux CRDs)
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -skip SealedSecret \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml

      - name: Install kube-linter
        run: |
          curl -sSLo /tmp/kube-linter.tar.gz https://github.com/stackrox/kube-linter/releases/download/v0.7.0/kube-linter-linux.tar.gz
          tar -xzf /tmp/kube-linter.tar.gz -C /tmp
          sudo install -m 755 /tmp/kube-linter /usr/local/bin/kube-linter

      - name: Run kube-linter
        id: lint-app
        continue-on-error: true
        run: |
          set -o pipefail
          kube-linter lint /tmp/rendered.yaml 2>&1 | tee /tmp/lint-app.txt

      - name: Install yq
        run: |
          sudo curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Monitoring Stack
        run: |
          REPOS_FILE="infrastructure/monitoring/repositories.yaml"
          RELEASES_FILE="infrastructure/monitoring/releases.yaml"

          REPO_NAMES=$(yq eval -N -r 'select(.kind == "HelmRepository") | .metadata.name' "$REPOS_FILE")
          for REPO in $REPO_NAMES; do
            URL=$(yq eval -N -r "select(.metadata.name == \"$REPO\") | .spec.url" "$REPOS_FILE")
            helm repo add "$REPO" "$URL"
          done
          helm repo update

          rm -f /tmp/helm-rendered.yaml
          touch /tmp/helm-rendered.yaml

          NAMES=$(yq eval -N -r 'select(.kind == "HelmRelease") | .metadata.name' "$RELEASES_FILE")
          for NAME in $NAMES; do
            CHART=$(yq eval -N -r "select(.metadata.name == \"$NAME\") | .spec.chart.spec.chart" "$RELEASES_FILE")
            VERSION=$(yq eval -N -r "select(.metadata.name == \"$NAME\") | .spec.chart.spec.version" "$RELEASES_FILE")
            SOURCE=$(yq eval -N -r "select(.metadata.name == \"$NAME\") | .spec.chart.spec.sourceRef.name" "$RELEASES_FILE")

            yq eval -N "select(.metadata.name == \"$NAME\") | .spec.values" "$RELEASES_FILE" > /tmp/values-$NAME.yaml

            echo "Rendering $NAME ($SOURCE/$CHART @ $VERSION)"
            helm template "$NAME" "$SOURCE/$CHART" \
              --version "$VERSION" \
              -f /tmp/values-$NAME.yaml \
              --namespace monitoring >> /tmp/helm-rendered.yaml
          done

      - name: Lint monitoring stack
        id: lint-monitoring
        continue-on-error: true
        run: |
          set -o pipefail
          kube-linter lint --config .github/lint/kube-linter-monitoring.yaml /tmp/helm-rendered.yaml 2>&1 | tee /tmp/lint-monitoring.txt

      - name: Summarize lint results
        if: always()
        run: |
          {
            echo "## Kube-linter results"
            echo
            echo "- App manifests: ${{ steps.lint-app.outcome }}"
            echo "- Monitoring Helm stack: ${{ steps.lint-monitoring.outcome }}"
            echo
            if [[ -f /tmp/lint-app.txt ]]; then
              echo "### App lint output"
              echo '```text'
              cat /tmp/lint-app.txt
              echo '```'
              echo
            fi
            if [[ -f /tmp/lint-monitoring.txt ]]; then
              echo "### Monitoring lint output"
              echo '```text'
              cat /tmp/lint-monitoring.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce app lint
        if: steps.lint-app.outcome == 'failure'
        run: |
          echo "App manifest linting failed. Monitoring lint is advisory only."
          exit 1
