apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster
  namespace: dagster
spec:
  values:
    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 150m
          memory: 384Mi
        limits:
          cpu: 400m
          memory: 768Mi
    dagsterDaemon:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 150m
          memory: 256Mi
    dagster-user-deployments:
      deployments:
        - name: k8s-example-user-code-1
          image:
            repository: docker.io/dagster/user-code-example
            tag: "1.13.12"
            pullPolicy: Always
          dagsterApiGrpcArgs:
            - "--python-file"
            - "/example_project/example_repo/repo.py"
          port: 3030
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 150m
              memory: 256Mi