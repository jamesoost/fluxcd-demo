apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster-postgresql
  namespace: dagster
spec:
  interval: 5m
  chart:
    spec:
      chart: postgresql
      version: "18.7.13"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: dagster
      interval: 1h
  values:
    auth:
      username: dagster
      database: dagster
      existingSecret: dagster-postgresql
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: postgresql-password
    primary:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 512Mi
      persistence:
        size: 2Gi
