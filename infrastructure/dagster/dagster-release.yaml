apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster
  namespace: dagster
spec:
  interval: 5m
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  dependsOn:
    - name: dagster-postgresql
      namespace: dagster
  chart:
    spec:
      chart: dagster
      version: "1.13.12"
      sourceRef:
        kind: HelmRepository
        name: dagster
        namespace: dagster
      interval: 1h
  values:
    global:
      postgresqlSecretName: dagster-postgresql
    generatePostgresqlPasswordSecret: false
    postgresql:
      enabled: false
      postgresqlHost: dagster-postgresql
      postgresqlUsername: dagster
      postgresqlDatabase: dagster
      service:
        port: 5432
    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
    dagsterDaemon:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    dagster-user-deployments:
      deployments:
        - name: k8s-example-user-code-1
          image:
            repository: docker.io/dagster/user-code-example
            tag: "1.13.12"
            pullPolicy: Always
          dagsterApiGrpcArgs:
            - "--python-file"
            - "/example_project/example_repo/repo.py"
          port: 3030
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
