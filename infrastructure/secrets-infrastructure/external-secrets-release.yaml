apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: secrets-infrastructure
spec:
  interval: 5m
  dependsOn:
    - name: vault
  chart:
    spec:
      chart: external-secrets
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: secrets-infrastructure
      interval: 1h
  values:
    installCRDs: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
