apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: secrets-infrastructure
spec:
  interval: 5m
  chart:
    spec:
      chart: vault
      version: "0.28.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: secrets-infrastructure
      interval: 1h
  values:
    server:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi
      dataStorage:
        enabled: true
        size: 10Gi
      ha:
        enabled: false
    injector:
      enabled: false
    csi:
      enabled: true
    ui:
      enabled: true
